name: Build Unity Ads Plugin AAR
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download and extract Godot library
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz"
          unzip -q "Godot_v4.3-stable_export_templates.tpz" -d godot_templates
          mkdir -p godot_android_lib
          ANDROID_SOURCE=$(find godot_templates -name "android_source.zip" | head -1)
          echo "android_source.zip: $ANDROID_SOURCE"
          if [ -n "$ANDROID_SOURCE" ]; then
            unzip -q "$ANDROID_SOURCE" -d android_source_extracted
            find android_source_extracted -name "godot-lib*.aar" -exec cp {} godot_android_lib/ \;
          fi
          echo "=== Godot libs ==="
          ls godot_android_lib/
          if [ -z "$(ls godot_android_lib/)" ]; then
            echo "ERROR: No godot-lib AAR found!"
            exit 1
          fi

      - name: Update gradle path
        run: |
          GRADLE_FILE=$(find . -name "build.gradle.kts" 2>/dev/null | head -1)
          echo "Found: $GRADLE_FILE"
          sed -i "s|REPLACE_WITH_PATH_TO_GODOT_ANDROID_TEMPLATES|${GITHUB_WORKSPACE}/godot_android_lib|g" "$GRADLE_FILE"

      - name: Build AAR
        run: |
          ANDROID_DIR=$(find . -name "build.gradle.kts" -exec dirname {} \; | head -1)
          cd "$ANDROID_DIR"
          gradle assembleRelease --no-daemon

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: UnityAdsPlugin
          path: |
            **/UnityAds.gd
            **/plugin.cfg
            **/android-release.aar
