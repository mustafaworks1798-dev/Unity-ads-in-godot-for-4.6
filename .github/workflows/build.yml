name: Build Unity Ads Plugin AAR
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Download Godot Templates
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz"
          unzip -q "Godot_v4.3-stable_export_templates.tpz" -d godot_templates
          mkdir -p godot_android_lib
          find godot_templates -name "godot-lib*.aar" -exec cp {} godot_android_lib/ \;
      - name: Update gradle path
        run: |
          sed -i "s|REPLACE_WITH_PATH_TO_GODOT_ANDROID_TEMPLATES|${GITHUB_WORKSPACE}/godot_android_lib|g" unity-ads-godot/android/build.gradle.kts
      - name: Build AAR
        run: |
          cd unity-ads-godot/android
          gradle assembleRelease --no-daemon
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: UnityAdsPlugin
          path: |
            unity-ads-godot/addons/unity_ads/UnityAds.gd
            unity-ads-godot/addons/unity_ads/plugin.cfg
            unity-ads-godot/android/build/outputs/aar/android-release.aar
